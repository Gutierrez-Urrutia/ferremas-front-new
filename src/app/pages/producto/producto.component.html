<div class="container mt-4">
  <div *ngIf="loading" class="text-center py-5">Cargando producto...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="producto">
    <div class="row">
      <div class="col-12">
        <app-card [producto]="producto"></app-card>
      </div>
    </div>

    <!-- Additional product details can go here if needed -->
    <div class="row mt-3">
      <div class="col-12">
        <h5>Descripción</h5>
        <p class="text-muted">{{ producto.descripcion }}</p>
      </div>
    </div>
  </div>
</div>
